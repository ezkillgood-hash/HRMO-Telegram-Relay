name: HRMO Telegram Relay

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: hrmo-telegram-relay
  cancel-in-progress: false

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
           - name: Install browser
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch pending HRMO notifications
        shell: bash
        env:
          HRMO_URL: ${{ secrets.HRMO_URL }}
          HRMO_SECRET_KEY: ${{ secrets.HRMO_SECRET_KEY }}
        run: |
          cat > fetch-queue.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const baseUrl = process.env.HRMO_URL.replace(/\/+$/, '');
            const secretKey = process.env.HRMO_SECRET_KEY;

            const apiUrl =
              `${baseUrl}/index.php?api=github_telegram_queue&key=${encodeURIComponent(secretKey)}`;

            const browser = await chromium.launch({
              headless: true
            });

            const page = await browser.newPage({
              userAgent:
                'Mozilla/5.0 (Windows NT 10.0; Win64; x64) ' +
                'AppleWebKit/537.36 Chrome/150 Safari/537.36'
            });

            console.log('Opening HRMO queue through browser...');

            await page.goto(apiUrl, {
              waitUntil: 'domcontentloaded',
              timeout: 90000
            });

            // InfinityFree security page sets a cookie and redirects.
            await page.waitForTimeout(5000);

            let bodyText = (await page.locator('body').innerText()).trim();

            console.log('Final URL:', page.url());
            console.log('Server response:', bodyText);

            try {
              const parsed = JSON.parse(bodyText);

              if (!parsed.ok) {
                throw new Error(
                  parsed.message || 'HRMO API returned ok=false'
                );
              }

              fs.writeFileSync(
                'queue.json',
                JSON.stringify(parsed, null, 2)
              );

              console.log(
                `Queue successfully loaded. Count: ${parsed.count || 0}`
              );
            } catch (error) {
              console.error('Response is not valid JSON.');
              console.error(bodyText);
              throw error;
            } finally {
              await browser.close();
            }
          })();
          EOF

          node fetch-queue.js

      - name: Send queued messages to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HRMO_URL: ${{ secrets.HRMO_URL }}
          HRMO_SECRET_KEY: ${{ secrets.HRMO_SECRET_KEY }}
        run: |
          set -euo pipefail

          BASE_URL="${HRMO_URL%/}"

          COUNT=$(jq -r '.count // 0' queue.json)
          echo "Pending queue items: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "No pending messages."
            exit 0
          fi

          jq -c '.items[]' queue.json | while read -r ITEM; do
            ID=$(echo "$ITEM" | jq -r '.id')
            MESSAGE=$(echo "$ITEM" | jq -r '.message')

            echo "Sending queue item $ID..."

            RESPONSE=$(curl \
              --silent \
              --show-error \
              --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE}" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "disable_web_page_preview=true")

            OK=$(echo "$RESPONSE" | jq -r '.ok // false')

            if [ "$OK" = "true" ]; then
              echo "Queue $ID sent successfully."

              curl \
                --http1.1 \
                --ipv4 \
                --location \
                --retry 3 \
                --silent \
                --show-error \
                --fail-with-body \
                "${BASE_URL}/index.php?api=github_telegram_ack&key=${HRMO_SECRET_KEY}&id=${ID}&result=sent"
            else
              ERROR=$(echo "$RESPONSE" | jq -r '.description // "Telegram error"')
              echo "Queue $ID failed: $ERROR"

              curl \
                --http1.1 \
                --ipv4 \
                --location \
                --retry 3 \
                --silent \
                --show-error \
                --get \
                "${BASE_URL}/index.php" \
                --data-urlencode "api=github_telegram_ack" \
                --data-urlencode "key=${HRMO_SECRET_KEY}" \
                --data-urlencode "id=${ID}" \
                --data-urlencode "result=failed" \
                --data-urlencode "error=${ERROR}"

              exit 1
            fi
          done
