name: HRMO Telegram Relay

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

jobs:
  telegram-relay:
    runs-on: ubuntu-latest

    steps:
      - name: Get Pending Notifications
        run: |
          curl "${{ secrets.HRMO_URL }}/index.php?api=telegram_queue&key=${{ secrets.HRMO_SECRET_KEY }}" -o queue.json

      - name: Display Queue
        run: |
          cat queue.json
