name: HRMO Telegram Relay

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: hrmo-telegram-relay
  cancel-in-progress: false

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fetch pending HRMO notifications
        shell: bash
        env:
          HRMO_URL: ${{ secrets.HRMO_URL }}
          HRMO_SECRET_KEY: ${{ secrets.HRMO_SECRET_KEY }}
        run: |
          set -euo pipefail

          BASE_URL="${HRMO_URL%/}"
          API_URL="${BASE_URL}/index.php?api=github_telegram_queue&key=${HRMO_SECRET_KEY}"

          echo "Connecting to HRMO relay API..."

          curl \
            --http1.1 \
            --ipv4 \
            --location \
            --retry 5 \
            --retry-delay 5 \
            --connect-timeout 30 \
            --max-time 90 \
            --user-agent "Mozilla/5.0" \
            --header "Accept: application/json,text/plain,*/*" \
            --header "Cache-Control: no-cache" \
            --header "Referer: ${BASE_URL}/" \
            --silent \
            --show-error \
            --fail-with-body \
            "$API_URL" \
            --output queue.json

          echo "Server response:"
          cat queue.json

      - name: Send queued messages to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HRMO_URL: ${{ secrets.HRMO_URL }}
          HRMO_SECRET_KEY: ${{ secrets.HRMO_SECRET_KEY }}
        run: |
          set -euo pipefail

          BASE_URL="${HRMO_URL%/}"

          COUNT=$(jq -r '.count // 0' queue.json)
          echo "Pending queue items: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "No pending messages."
            exit 0
          fi

          jq -c '.items[]' queue.json | while read -r ITEM; do
            ID=$(echo "$ITEM" | jq -r '.id')
            MESSAGE=$(echo "$ITEM" | jq -r '.message')

            echo "Sending queue item $ID..."

            RESPONSE=$(curl \
              --silent \
              --show-error \
              --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE}" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "disable_web_page_preview=true")

            OK=$(echo "$RESPONSE" | jq -r '.ok // false')

            if [ "$OK" = "true" ]; then
              echo "Queue $ID sent successfully."

              curl \
                --http1.1 \
                --ipv4 \
                --location \
                --retry 3 \
                --silent \
                --show-error \
                --fail-with-body \
                "${BASE_URL}/index.php?api=github_telegram_ack&key=${HRMO_SECRET_KEY}&id=${ID}&result=sent"
            else
              ERROR=$(echo "$RESPONSE" | jq -r '.description // "Telegram error"')
              echo "Queue $ID failed: $ERROR"

              curl \
                --http1.1 \
                --ipv4 \
                --location \
                --retry 3 \
                --silent \
                --show-error \
                --get \
                "${BASE_URL}/index.php" \
                --data-urlencode "api=github_telegram_ack" \
                --data-urlencode "key=${HRMO_SECRET_KEY}" \
                --data-urlencode "id=${ID}" \
                --data-urlencode "result=failed" \
                --data-urlencode "error=${ERROR}"

              exit 1
            fi
          done
